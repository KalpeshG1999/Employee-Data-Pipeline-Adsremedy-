services:
  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username airflow --password airflow --firstname Kalpesh --lastname User --role Admin --email admin@test.com || true &&
      airflow webserver --port 8080
      "